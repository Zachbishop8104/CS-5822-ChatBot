<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generate</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <script src="config.js"></script>
    <link rel="stylesheet" href="chatbot.css">
  </head>
  <body>
    <div class="app">
      <header>
        <div class="dot"></div>
        <div class="title">gen<span>_</span>chat</div>
        <div class="badge">FastAPI · /generate</div>
      </header>

      <aside>
        <div>
          <div class="section-title">Model</div>
          <div class="field">
            <label>model_file_name</label>
            <input
              type="text"
              id="model_file_name"
              value="Model_finetuned_best.pth"
            />
          </div>
        </div>
        <div>
          <div class="section-title">Prompt extras</div>
          <div class="field">
            <label>context</label>
            <input type="text" id="context" placeholder="optional context…" />
          </div>
          <div class="field" style="margin-top: 8px">
            <label>instruction</label>
            <input
              type="text"
              id="instruction"
              placeholder="optional instruction…"
            />
          </div>
        </div>
        <div>
          <div class="section-title">Sampling</div>
          <div class="field">
            <label>temperature</label>
            <div class="range-row">
              <input
                type="range"
                id="temperature"
                min="0"
                max="2"
                step="0.05"
                value="0.1"
              />
              <span class="range-val" id="temperature_val">0.10</span>
            </div>
          </div>
          <div class="field" style="margin-top: 8px">
            <label>top_k</label>
            <div class="range-row">
              <input
                type="range"
                id="top_k"
                min="1"
                max="100"
                step="1"
                value="10"
              />
              <span class="range-val" id="top_k_val">10</span>
            </div>
          </div>
          <div class="field" style="margin-top: 8px">
            <label>max_new_tokens</label>
            <div class="range-row">
              <input
                type="range"
                id="max_new_tokens"
                min="10"
                max="512"
                step="10"
                value="80"
              />
              <span class="range-val" id="max_new_tokens_val">80</span>
            </div>
          </div>
        </div>
        <div>
          <div class="section-title">Flags</div>
          <div class="toggle-row">
            <span class="toggle-label">prepend_bos</span>
            <label class="toggle"
              ><input type="checkbox" id="prepend_bos" /><span
                class="slider"
              ></span
            ></label>
          </div>
          <div class="toggle-row" style="margin-top: 8px">
            <span class="toggle-label">auto_grounding</span>
            <label class="toggle"
              ><input type="checkbox" id="auto_grounding" /><span
                class="slider"
              ></span
            ></label>
          </div>
          <div class="toggle-row" style="margin-top: 8px">
            <span class="toggle-label">debug_grounding</span>
            <label class="toggle"
              ><input type="checkbox" id="debug_grounding" /><span
                class="slider"
              ></span
            ></label>
          </div>
          <div class="field" style="margin-top: 10px">
            <label>grounding_sentences</label>
            <input
              type="number"
              id="grounding_sentences"
              value="2"
              min="1"
              max="20"
            />
          </div>
        </div>
      </aside>

      <main>
        <div id="messages">
          <div class="empty" id="empty">
            <div class="glyph">⌘</div>
            <p>Adjust params · write a prompt · send</p>
          </div>
        </div>
        <div class="input-area">
          <div class="input-row">
            <textarea
              id="prompt"
              placeholder="Enter prompt…"
              rows="1"
            ></textarea>
            <button id="send-btn" title="Send">
              <svg viewBox="0 0 24 24">
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
          <div class="hint">
            <kbd>Shift+Enter</kbd> newline &nbsp;·&nbsp; Enter to send
          </div>
        </div>
      </main>
    </div>

    <script>
      const API = CONFIG.API;

      document.addEventListener("DOMContentLoaded", function () {
        ["temperature", "top_k", "max_new_tokens"].forEach((id) => {
          const el = document.getElementById(id);
          const vl = document.getElementById(id + "_val");
          const fmt =
            id === "temperature" ? (v) => parseFloat(v).toFixed(2) : (v) => v;
          el.addEventListener("input", () => (vl.textContent = fmt(el.value)));
        });

        promptEl.addEventListener("input", () => {
          promptEl.style.height = "auto";
          promptEl.style.height = Math.min(promptEl.scrollHeight, 140) + "px";
        });
        promptEl.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            send();
          }
        });
        document.getElementById("send-btn").addEventListener("click", send);
      });

      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      const msgsEl = document.getElementById("messages");

      function addMsg(role, text) {
        document.getElementById("empty").style.display = "none";
        const labels = { user: "▸ you", bot: "◈ model", err: "✕ error" };
        const div = document.createElement("div");
        div.className = "msg " + role;
        div.innerHTML = `<div class="msg-lbl">${labels[role] || role}</div><div class="msg-body">${esc(text)}</div>`;
        msgsEl.appendChild(div);
        msgsEl.scrollTop = msgsEl.scrollHeight;
      }

      function addDebug(stderr) {
        if (!stderr) return;
        const det = document.createElement("details");
        det.className = "msg-debug";
        det.innerHTML = `<summary>stderr / debug</summary>\n${esc(stderr)}`;
        msgsEl.appendChild(det);
        msgsEl.scrollTop = msgsEl.scrollHeight;
      }

      function addTyping() {
        document.getElementById("empty").style.display = "none";
        const div = document.createElement("div");
        div.className = "msg bot typing";
        div.innerHTML = `<div class="msg-lbl">◈ model</div><div class="msg-body"><div class="d"></div><div class="d"></div><div class="d"></div></div>`;
        msgsEl.appendChild(div);
        msgsEl.scrollTop = msgsEl.scrollHeight;
        return div;
      }

      function getParams() {
        return {
          prompt: promptEl.value.trim(),
          model_file_name: document
            .getElementById("model_file_name")
            .value.trim(),
          context: document.getElementById("context").value.trim(),
          instruction: document.getElementById("instruction").value.trim(),
          temperature: parseFloat(document.getElementById("temperature").value),
          top_k: parseInt(document.getElementById("top_k").value),
          max_new_tokens: parseInt(
            document.getElementById("max_new_tokens").value,
          ),
          prepend_bos: document.getElementById("prepend_bos").checked,
          auto_grounding: document.getElementById("auto_grounding").checked,
          grounding_sentences: parseInt(
            document.getElementById("grounding_sentences").value,
          ),
          debug_grounding: document.getElementById("debug_grounding").checked,
        };
      }

      async function send() {
        const promptEl = document.getElementById("prompt");
        const params = getParams();
        if (!params.prompt) return;

        addMsg("user", params.prompt);
        promptEl.value = "";
        promptEl.style.height = "auto";
        document.getElementById("send-btn").disabled = true;
        const typing = addTyping();

        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(params),
          });
          const data = await res.json();
          typing.remove();

          if (!res.ok) {
            addMsg("err", data.detail || `HTTP ${res.status}`);
          } else if (data.returncode !== 0) {
            addMsg("err", data.output || "Script exited with non-zero code.");
            addDebug(data.stderr);
          } else {
            addMsg("bot", data.output);
            addDebug(data.stderr); // only visible if debug_grounding is on
          }
        } catch (e) {
          typing.remove();
          addMsg("err", "Could not reach FastAPI server.\n" + e.message);
        } finally {
          document.getElementById("send-btn").disabled = false;
          promptEl.focus();
        }
      }
    </script>
  </body>
</html>
