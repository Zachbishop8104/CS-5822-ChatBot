<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generate</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <script src="config.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #0b0c0f;
        --surface: #13151a;
        --panel: #0f1115;
        --border: #252830;
        --accent: #e8ff47;
        --accent2: #47ffd4;
        --err: #ff5c5c;
        --text: #dde0ec;
        --muted: #525669;
        --mono: "IBM Plex Mono", monospace;
        --display: "Syne", sans-serif;
        --r: 8px;
      }
      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.6;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image:
          linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 44px 44px;
        opacity: 0.12;
      }
      .app {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 260px 1fr;
        grid-template-rows: auto 1fr;
        height: 100vh;
        max-width: 1100px;
        margin: 0 auto;
      }
      header {
        grid-column: 1/-1;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
        animation: pulse 2.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(0.7);
        }
      }
      .title {
        font-family: var(--display);
        font-size: 17px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .title span {
        color: var(--accent);
      }
      .badge {
        margin-left: auto;
        font-size: 10px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 2px 8px;
        letter-spacing: 0.08em;
      }
      aside {
        border-right: 1px solid var(--border);
        background: var(--panel);
        padding: 18px 14px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .section-title {
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .field label {
        font-size: 11px;
        color: var(--muted);
      }
      .field input[type="text"],
      .field input[type="number"],
      .field select {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: var(--mono);
        font-size: 12px;
        padding: 5px 8px;
        border-radius: 5px;
        outline: none;
        width: 100%;
        transition: border-color 0.15s;
      }
      .field input:focus,
      .field select:focus {
        border-color: var(--accent2);
      }
      .field input[type="range"] {
        accent-color: var(--accent2);
        width: 100%;
        cursor: pointer;
      }
      .range-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .range-val {
        font-size: 11px;
        color: var(--accent2);
        min-width: 30px;
        text-align: right;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .toggle-label {
        font-size: 11px;
        color: var(--muted);
      }
      .toggle {
        position: relative;
        width: 32px;
        height: 18px;
        flex-shrink: 0;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: var(--border);
        border-radius: 9px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .slider::before {
        content: "";
        position: absolute;
        width: 12px;
        height: 12px;
        left: 3px;
        top: 3px;
        border-radius: 50%;
        background: #fff;
        transition: transform 0.2s;
      }
      .toggle input:checked + .slider {
        background: var(--accent2);
      }
      .toggle input:checked + .slider::before {
        transform: translateX(14px);
      }
      main {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px 22px 12px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
      #messages::-webkit-scrollbar {
        width: 3px;
      }
      #messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      .empty {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--muted);
        pointer-events: none;
        animation: fadeUp 0.4s ease both;
      }
      .empty .glyph {
        font-size: 36px;
      }
      .empty p {
        font-size: 11px;
        letter-spacing: 0.06em;
      }
      .msg {
        display: flex;
        flex-direction: column;
        gap: 3px;
        animation: fadeUp 0.2s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(7px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .msg-lbl {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0 3px;
      }
      .msg.user .msg-lbl {
        color: var(--accent);
      }
      .msg.bot .msg-lbl {
        color: var(--accent2);
      }
      .msg.err .msg-lbl {
        color: var(--err);
      }
      .msg-body {
        padding: 11px 14px;
        border-radius: var(--r);
        border: 1px solid var(--border);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .msg.user .msg-body {
        background: var(--surface);
        margin-left: 28px;
      }
      .msg.bot .msg-body {
        background: var(--panel);
        border-left: 3px solid var(--accent2);
        margin-right: 28px;
      }
      .msg.err .msg-body {
        background: #110a0a;
        border-left: 3px solid var(--err);
        color: #ff7f7f;
        margin-right: 28px;
      }
      details.msg-debug {
        margin-top: 4px;
        margin-right: 28px;
        padding: 8px 12px;
        border-radius: var(--r);
        background: #0d1210;
        border: 1px solid #1d2e28;
        font-size: 11px;
        color: #3a8c6e;
        white-space: pre-wrap;
        word-break: break-word;
      }
      details.msg-debug summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .typing .msg-body {
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .typing .d {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--accent2);
        animation: blink 1.2s ease-in-out infinite;
      }
      .typing .d:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing .d:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.2;
          transform: scale(0.8);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }
      .input-area {
        border-top: 1px solid var(--border);
        padding: 14px 20px 18px;
        flex-shrink: 0;
      }
      .input-row {
        display: flex;
        gap: 8px;
        align-items: flex-end;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 9px 11px;
        transition: border-color 0.15s;
      }
      .input-row:focus-within {
        border-color: var(--accent);
      }
      #prompt {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.5;
        resize: none;
        max-height: 140px;
        min-height: 20px;
      }
      #prompt::placeholder {
        color: var(--muted);
      }
      #send-btn {
        flex-shrink: 0;
        background: var(--accent);
        color: #0b0c0f;
        border: none;
        border-radius: 6px;
        width: 32px;
        height: 32px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }
      #send-btn:hover {
        opacity: 0.85;
      }
      #send-btn:active {
        transform: scale(0.92);
      }
      #send-btn:disabled {
        opacity: 0.25;
        cursor: not-allowed;
        transform: none;
      }
      #send-btn svg {
        width: 15px;
        height: 15px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .hint {
        margin-top: 6px;
        font-size: 10px;
        color: var(--muted);
      }
      .hint kbd {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 1px 4px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="dot"></div>
        <div class="title">gen<span>_</span>chat</div>
        <div class="badge">FastAPI · /generate</div>
      </header>

      <aside>
        <div>
          <div class="section-title">Model</div>
          <div class="field">
            <label>model_file_name</label>
            <input
              type="text"
              id="model_file_name"
              value="Model_finetuned_best.pth"
            />
          </div>
        </div>
        <div>
          <div class="section-title">Prompt extras</div>
          <div class="field">
            <label>context</label>
            <input type="text" id="context" placeholder="optional context…" />
          </div>
          <div class="field" style="margin-top: 8px">
            <label>instruction</label>
            <input
              type="text"
              id="instruction"
              placeholder="optional instruction…"
            />
          </div>
        </div>
        <div>
          <div class="section-title">Sampling</div>
          <div class="field">
            <label>temperature</label>
            <div class="range-row">
              <input
                type="range"
                id="temperature"
                min="0"
                max="2"
                step="0.05"
                value="0.1"
              />
              <span class="range-val" id="temperature_val">0.10</span>
            </div>
          </div>
          <div class="field" style="margin-top: 8px">
            <label>top_k</label>
            <div class="range-row">
              <input
                type="range"
                id="top_k"
                min="1"
                max="100"
                step="1"
                value="10"
              />
              <span class="range-val" id="top_k_val">10</span>
            </div>
          </div>
          <div class="field" style="margin-top: 8px">
            <label>max_new_tokens</label>
            <div class="range-row">
              <input
                type="range"
                id="max_new_tokens"
                min="10"
                max="512"
                step="10"
                value="80"
              />
              <span class="range-val" id="max_new_tokens_val">80</span>
            </div>
          </div>
        </div>
        <div>
          <div class="section-title">Flags</div>
          <div class="toggle-row">
            <span class="toggle-label">prepend_bos</span>
            <label class="toggle"
              ><input type="checkbox" id="prepend_bos" /><span
                class="slider"
              ></span
            ></label>
          </div>
          <div class="toggle-row" style="margin-top: 8px">
            <span class="toggle-label">auto_grounding</span>
            <label class="toggle"
              ><input type="checkbox" id="auto_grounding" /><span
                class="slider"
              ></span
            ></label>
          </div>
          <div class="toggle-row" style="margin-top: 8px">
            <span class="toggle-label">debug_grounding</span>
            <label class="toggle"
              ><input type="checkbox" id="debug_grounding" /><span
                class="slider"
              ></span
            ></label>
          </div>
          <div class="field" style="margin-top: 10px">
            <label>grounding_sentences</label>
            <input
              type="number"
              id="grounding_sentences"
              value="2"
              min="1"
              max="20"
            />
          </div>
        </div>
      </aside>

      <main>
        <div id="messages">
          <div class="empty" id="empty">
            <div class="glyph">⌘</div>
            <p>Adjust params · write a prompt · send</p>
          </div>
        </div>
        <div class="input-area">
          <div class="input-row">
            <textarea
              id="prompt"
              placeholder="Enter prompt…"
              rows="1"
            ></textarea>
            <button id="send-btn" title="Send">
              <svg viewBox="0 0 24 24">
                <line x1="22" y1="2" x2="11" y2="13" />
                <polygon points="22 2 15 22 11 13 2 9 22 2" />
              </svg>
            </button>
          </div>
          <div class="hint">
            <kbd>Shift+Enter</kbd> newline &nbsp;·&nbsp; Enter to send
          </div>
        </div>
      </main>
    </div>

    <script>
      const API = CONFIG.API;

      ["temperature", "top_k", "max_new_tokens"].forEach((id) => {
        const el = document.getElementById(id);
        const vl = document.getElementById(id + "_val");
        const fmt =
          id === "temperature" ? (v) => parseFloat(v).toFixed(2) : (v) => v;
        el.addEventListener("input", () => (vl.textContent = fmt(el.value)));
      });

      const promptEl = document.getElementById("prompt");
      promptEl.addEventListener("input", () => {
        promptEl.style.height = "auto";
        promptEl.style.height = Math.min(promptEl.scrollHeight, 140) + "px";
      });
      promptEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });
      document.getElementById("send-btn").addEventListener("click", send);

      function esc(s) {
        return s
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      const msgsEl = document.getElementById("messages");

      function addMsg(role, text) {
        document.getElementById("empty").style.display = "none";
        const labels = { user: "▸ you", bot: "◈ model", err: "✕ error" };
        const div = document.createElement("div");
        div.className = "msg " + role;
        div.innerHTML = `<div class="msg-lbl">${labels[role] || role}</div><div class="msg-body">${esc(text)}</div>`;
        msgsEl.appendChild(div);
        msgsEl.scrollTop = msgsEl.scrollHeight;
      }

      function addDebug(stderr) {
        if (!stderr) return;
        const det = document.createElement("details");
        det.className = "msg-debug";
        det.innerHTML = `<summary>stderr / debug</summary>\n${esc(stderr)}`;
        msgsEl.appendChild(det);
        msgsEl.scrollTop = msgsEl.scrollHeight;
      }

      function addTyping() {
        document.getElementById("empty").style.display = "none";
        const div = document.createElement("div");
        div.className = "msg bot typing";
        div.innerHTML = `<div class="msg-lbl">◈ model</div><div class="msg-body"><div class="d"></div><div class="d"></div><div class="d"></div></div>`;
        msgsEl.appendChild(div);
        msgsEl.scrollTop = msgsEl.scrollHeight;
        return div;
      }

      function getParams() {
        return {
          prompt: promptEl.value.trim(),
          model_file_name: document
            .getElementById("model_file_name")
            .value.trim(),
          context: document.getElementById("context").value.trim(),
          instruction: document.getElementById("instruction").value.trim(),
          temperature: parseFloat(document.getElementById("temperature").value),
          top_k: parseInt(document.getElementById("top_k").value),
          max_new_tokens: parseInt(
            document.getElementById("max_new_tokens").value,
          ),
          prepend_bos: document.getElementById("prepend_bos").checked,
          auto_grounding: document.getElementById("auto_grounding").checked,
          grounding_sentences: parseInt(
            document.getElementById("grounding_sentences").value,
          ),
          debug_grounding: document.getElementById("debug_grounding").checked,
        };
      }

      async function send() {
        const params = getParams();
        if (!params.prompt) return;

        addMsg("user", params.prompt);
        promptEl.value = "";
        promptEl.style.height = "auto";
        document.getElementById("send-btn").disabled = true;
        const typing = addTyping();

        try {
          const res = await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(params),
          });
          const data = await res.json();
          typing.remove();

          if (!res.ok) {
            addMsg("err", data.detail || `HTTP ${res.status}`);
          } else if (data.returncode !== 0) {
            addMsg("err", data.output || "Script exited with non-zero code.");
            addDebug(data.stderr);
          } else {
            addMsg("bot", data.output);
            addDebug(data.stderr); // only visible if debug_grounding is on
          }
        } catch (e) {
          typing.remove();
          addMsg("err", "Could not reach FastAPI server.\n" + e.message);
        } finally {
          document.getElementById("send-btn").disabled = false;
          promptEl.focus();
        }
      }
    </script>
  </body>
</html>
